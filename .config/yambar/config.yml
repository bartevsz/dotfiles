# ==============================================================================
# ARCHITEKTURA INFORMACJI: ERGONOMICZNY PANEL YAMBAR
# ==============================================================================

anchors:
  colors:
    - &bg       101417FF
    - &fg       E0E0E0FF
    - &primary  55CDAFFF
    - &accent   F5644BFF
    - &warning  FAD282FF
    - &info     196E82FF
    - &danger   D23250FF
    - &muted    909090FF

  spacing_and_margins:
    - &mod_space 16
    - &in_space  6

  fonts:
    - &font_main  "JetBrainsMono Nerd Font:style=Regular:pixelsize=14"
    - &font_icon  "JetBrainsMono Nerd Font:style=Regular:pixelsize=16"

bar:
  height: 34
  location: top
  layer: bottom
  background: *bg
  foreground: *fg
  font: *font_main
  spacing: *mod_space
  left-margin: 14
  right-margin: 14

  left:
    - i3:
        sort: native
        strip-workspace-numbers: true
        content:
          "":
            map:
              conditions:
                state == focused:
                  list:
                    spacing: *in_space
                    items:
                      - string: {text: "󰝥", font: *font_icon, foreground: *accent}
                      - string: {text: "{name}", foreground: *fg}
                urgent:
                  list:
                    spacing: *in_space
                    items:
                      - string: {text: "󰀨", font: *font_icon, foreground: *danger}
                      - string: {text: "{name}", foreground: *danger}
                default:
                  list:
                    spacing: *in_space
                    items:
                      - string: {text: "󰝦", font: *font_icon, foreground: *muted}
                      - string: {text: "{name}", foreground: *muted}

    - foreign-toplevel:
        content:
          map:
            conditions:
              activated:
                list:
                  spacing: 12
                  items:
                    - string: {text: "│", foreground: *muted}
                    - string: {text: "󰖯", font: *font_icon, foreground: *info}
                    - string: {text: "{app-id}", foreground: *fg}

  center:
    - clock:
        time-format: "%H:%M"
        date-format: "%A, %d %b %Y"
        content:
          list:
            spacing: *mod_space
            items:
              - list:
                  spacing: *in_space
                  items:
                    - string: {text: "󰥔", font: *font_icon, foreground: *accent}
                    - string: {text: "{time}", foreground: *fg}
              - list:
                  spacing: *in_space
                  items:
                    - string: {text: "󰃭", font: *font_icon, foreground: *accent}
                    - string: {text: "{date}", foreground: *fg}

  right:
    - cpu:
        poll-interval: 2000
        content:
          map:
            conditions:
              id == -1:
                map:
                  conditions:
                    cpu > 85:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰻠", font: *font_icon, foreground: *danger}
                          - string: {text: "{cpu}%", foreground: *danger}
                    cpu > 60:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰻠", font: *font_icon, foreground: *warning}
                          - string: {text: "{cpu}%", foreground: *fg}
                    default:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰻠", font: *font_icon, foreground: *primary}
                          - string: {text: "{cpu}%", foreground: *fg}

    - mem:
        poll-interval: 3000
        content:
          map:
            conditions:
              percent > 85:
                list:
                  spacing: *in_space
                  items:
                    - string: {text: "󰍛", font: *font_icon, foreground: *danger}
                    - string: {text: "{used:gb}GB", foreground: *danger}
              percent > 70:
                list:
                  spacing: *in_space
                  items:
                    - string: {text: "󰍛", font: *font_icon, foreground: *warning}
                    - string: {text: "{used:gb}GB", foreground: *fg}
              default:
                list:
                  spacing: *in_space
                  items:
                    - string: {text: "󰍛", font: *font_icon, foreground: *primary}
                    - string: {text: "{used:gb}GB", foreground: *fg}

    - script:
        path: ~/.config/yambar/scripts/disk_io.fish
        poll-interval: 2000
        content:
          list:
            spacing: *in_space
            items:
              - string: {text: "󰋊", font: *font_icon, foreground: *primary}
              - string: {text: "{read}", foreground: *fg}

    - label:
        content:
          string: {text: "│", font: *font_icon, foreground: *muted}

    - pipewire:
        content:
          map:
            conditions:
              type == "sink":
                map:
                  conditions:
                    muted:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰖁", font: *font_icon, foreground: *muted}
                          - string: {text: "Wyciszenie", foreground: *muted}
                    ~muted:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰕾", font: *font_icon, foreground: *info}
                          - string: {text: "{linear_volume}%", foreground: *fg}

    - network:
        poll-interval: 4000
        content:
          map:
            default: {empty: {}}
            conditions:
              name == "wlan0":
                map:
                  conditions:
                    state == down:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰤭", font: *font_icon, foreground: *muted}
                          - string: {text: "Offline", foreground: *muted}
                    state == up:
                      map:
                        conditions:
                          ipv4 == "":
                            list:
                              spacing: *in_space
                              items:
                                - string: {text: "󰤯", font: *font_icon, foreground: *warning}
                                - string: {text: "Łączenie...", foreground: *warning}
                          default:
                            list:
                              spacing: *in_space
                              items:
                                - string: {text: "󰤨", font: *font_icon, foreground: *info}
                                - string: {text: "{ssid}", foreground: *fg}
                    default:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰤫", font: *font_icon, foreground: *muted}
                          - string: {text: "...", foreground: *muted}

    - battery:
        name: BAT0
        poll-interval: 30000
        content:
          map:
            conditions:
              state == charging:
                list:
                  spacing: *in_space
                  items:
                    - string: {text: "󰂄", font: *font_icon, foreground: *primary}
                    - string: {text: "{capacity}%", foreground: *primary}
              state == discharging:
                map:
                  conditions:
                    capacity < 15:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰂃", font: *font_icon, foreground: *danger}
                          - string: {text: "{capacity}%", foreground: *danger}
                    capacity < 30:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰁻", font: *font_icon, foreground: *warning}
                          - string: {text: "{capacity}%", foreground: *fg}
                    default:
                      list:
                        spacing: *in_space
                        items:
                          - string: {text: "󰁹", font: *font_icon, foreground: *info}
                          - string: {text: "{capacity}%", foreground: *fg}
              default:
                list:
                  spacing: *in_space
                  items:
                    - string: {text: "󰁹", font: *font_icon, foreground: *muted}
                    - string: {text: "{capacity}%", foreground: *fg}
