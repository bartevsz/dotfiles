# WINDOW RULEs
# Hyprland 0.55+
# =========================================================

# ---------------------------------------------------------
# OPACITY - DOMYŚLNE
# ---------------------------------------------------------

$opacity_active   = 0.97
$opacity_inactive = 0.88

windowrule = opacity $opacity_active $opacity_inactive, match:class .*

# ---------------------------------------------------------
# OPACITY - PRZEGLĄDARKI
# ---------------------------------------------------------

windowrule = opacity 0.99 0.90, match:class ^(firefox|Vivaldi-stable|vivaldi|Brave-browser|google-chrome|microsoft-edge)$

# ---------------------------------------------------------
# OPACITY - EDYTORY / NOTATKI
# ---------------------------------------------------------

windowrule = opacity 0.90 0.80, match:class ^(Code|VSCodium|com\.vscodium\.codium|md\.obsidian\.Obsidian)$

# ---------------------------------------------------------
# OPACITY - GAMING / LAUNCHERY
# ---------------------------------------------------------

windowrule = opacity 0.90 0.85, match:class ^(steam|com\.valvesoftware\.Steam|com\.heroicgameslauncher\.hgl)$

# ---------------------------------------------------------
# FULLSCREEN
# ---------------------------------------------------------

windowrule = opacity 1.0 1.0, match:fullscreen 1

# ---------------------------------------------------------
# FLOATING DIALOGS
# (opcjonalnie)
# ---------------------------------------------------------

windowrule = center 1, match:class ^(xdg-desktop-portal-gtk)$
windowrule = center 1, match:class ^(org\.gtk\.GtkFileChooserDialog)$
windowrule = center 1, match:title ^(Open File|Save File)$

# ---------------------------------------------------------
# PICTURE-IN-PICTURE
# (opcjonalnie dla Firefox/Vivaldi/Chrome)
# ---------------------------------------------------------

windowrule = float 1, match:title ^(Picture-in-Picture)$
windowrule = pin 1, match:title ^(Picture-in-Picture)$
windowrule = size 640 360, match:title ^(Picture-in-Picture)$
