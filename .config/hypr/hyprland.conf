# ==========================================
# 1. ZMIENNE GŁÓWNE
# ==========================================
source = ~/.config/hypr/conf/windowrules.conf

$mod = SUPER
$terminal = ghostty
$browser = ~/.local/bin/floorp
$fileManager = $terminal --class=launcher -e nnn
$menu = $terminal --class=launcher -e j4-dmenu-desktop --dmenu='fzf'
$comms = ~/.local/bin/ferdium
$ncspot = $terminal -e spotify_player
#textEditor = abiword

# ==========================================
# 2. MONITOR I AUTOSTART
# ==========================================
monitor=,preferred,auto,1

# 1. NAJPIERW ładujemy zmienne do D-Busa (wskazujemy je palcem, omijamy systemd)
exec-once = dbus-update-activation-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 2. DOPIERO POTEM restartujemy portale (z małym opóźnieniem, żeby uniknąć wyścigu procesów)
exec-once = killall xdg-desktop-portal-hyprland xdg-desktop-portal-gtk xdg-desktop-portal
exec-once = sleep 1 && /usr/libexec/xdg-desktop-portal-hyprland &

env = DISPLAY,:0
env = MOZ_ENABLE_WAYLAND,1

exec-once = yambar                                               
exec-once = mako          
exec-once = hyprpolkitagent
# exec-once = nm-applet      
gxec-once = easyeffects --gapplication-service
exec-once = swaybg -i ~/dotfiles/wallpapers/active_bg.jpg -m fill
splash = true

exec-once = pipewire & wireplumber & pipewire-pulse
exec-once = [workspace 9 silent] easyeffects

# ==========================================
# 3. KLAWIATURA (POLSKIE ZNAKI)
# ==========================================
input {
	kb_layout = pl
	kb_variant = ,
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1
}


# ==========================================
# 4. WYGLĄD
# ==========================================
general {
    gaps_in = 4.5
    gaps_out = 9
    border_size = 0
    col.active_border = rgba(A0153E99) # Neonowy Teal
    col.inactive_border = rgba(A0153E88) # Ciemny moduł z lekko pomarańczowym akcentem, pełnię mocy zyskuje, gdy jedno okno przykrywa drugie
    layout = dwindle
}

dwindle {
    preserve_split = true
}

decoration {
    rounding = 16
    shadow {
        enabled = true
        range = 666	
        color = rgba(FF7E0011) # malinkowy akcent A0153E44, alarmujacy amber F2B04633
    }
}

# ==========================================
# 5. SKRÓTY KLAWISZOWE (Zaktualizowane)
# ==========================================
# Myszy: Przesuwanie i Zmiana rozmiaru
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Terminal
bind = $mod, Return, exec, $terminal
bind = $mod, E, exec, $terminal

# System
bind = $mod, N, exec, $fileManager
bind = $mod, X, exec, thunar
bind = $mod, D, exec, $menu
bind = $mod, Q, killactive,
bind = $mod SHIFT, V, exec, hyprctl reload
bind = $mod SHIFT, M, exit,
bind = $mod, C, layoutmsg, togglesplit # Przełącza orientację splitu (pion/poziom)

# Programy
bind = $mod, W, exec, $browser
bind = $mod, S, exec, $ncspot
bind = $mod, A, exec, $comms
bind = $mod, P, exec, abiword

# ==========================================
# 6. SCREENSHOTY
# ==========================================
# Cały ekran
bind = $mod, Print, exec, grim ~/Pictures/screenshot-$(date +%s).png

# Region (WYŁĄCZNIE to jest najważniejszy fix)
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png

# Region do schowka
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# ==========================================
# 7. OKNA I FULLSCREEN
# ==========================================


# Win + F (Totalny fullscreen)
bind = $mod, F, fullscreen

# Przełączanie trybu floating: Win + Shift + Space
bind = $mod SHIFT, Space, togglefloating, active

# Manewrowanie fokusem za pomocą strzałek:
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Zamiana miejscami okien (i3 style): Win + Shift + Strzałki
bind = $mod SHIFT, Left, swapwindow, l
bind = $mod SHIFT, Right, swapwindow, r
bind = $mod SHIFT, Up, swapwindow, u
bind = $mod SHIFT, Down, swapwindow, d

# Nawigacja focus (j, k, b, o)
bind = $mod, J, bringactivetotop,
bind = $mod, K, bringactivetotop,
bind = $mod, B, movefocus, u
bind = $mod, O, movefocus, r
bind = $mod, G, togglegroup
bind = $mod, Tab, changegroupactive

# Workspace'y (1-0)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ==========================================
# 8. NOWA STRATEGIA PRZEZROCZYSTOŚCI
# ==========================================
windowrule = opacity 0.95 0.90, match:class ^(firefox|Vivaldi-stable|vivaldi)$
windowrule = opacity 1.0 1.0, match:fullscreen 1

# --- AUDIO (Thinkpad F1-F4) ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86MonBrightnessUp, exec, fish -c "brightness up"
bind = , XF86MonBrightnessDown, exec, fish -c "brightness down"
