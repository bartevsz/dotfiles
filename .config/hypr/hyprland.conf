# ==========================================
# 1. ZMIENNE GŁÓWNE
# ==========================================
$mod = SUPER
$terminal = foot
$browser = flatpak run com.vivaldi.Vivaldi
$fileManager = thunar
$menu = fuzzel

# ==========================================
# 2. MONITOR I AUTOSTART
# ==========================================
monitor=,preferred,auto,1

# Zabij stare portale, jeśli wiszą
exec-once = killall xdg-desktop-portal-hyprland xdg-desktop-portal-gtk xdg-desktop-portal
# Uruchom nowe
exec-once = /usr/libexec/xdg-desktop-portal-hyprland &
exec-once = /usr/libexec/xdg-desktop-portal-gtk &

# Uruchomienie skryptu listującego pakiety przy starcie
exec-once = dbus-update-activation-environment --all
exec-once = yambar
exec-once = mako
exec-once = nm-applet
exec-once = hyprpaper
exec-once = blueman-applet
exec-once = swww-daemon
exec-once = swww img ~/Pictures/wallpapersden.com_sci-fi-cool-landscape-art-2k23_2912x1632.jpg --transition-type wipe


# auto group na workspace 3
exec-once = hyprctl --batch "keyword group:groupbar false"

env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_QPA_PLATFORM, wayland;xcb

# ==========================================
# 3. KLAWIATURA (POLSKIE ZNAKI)
# ==========================================
input {
	kb_layout = pl,sk
	kb_variant = ,
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1
}


# ==========================================
# 4. WYGLĄD
# ==========================================
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(00f0d8ee) # Neonowy Teal
    col.inactive_border = rgba(1e2d3baa) # Nieaktywny, ciemny moduł
}

decoration {
    rounding = 3
    shadow {
        enabled = true
        range = 7
        color = rgba(0b111a99) # Cień zlewający się z tłem
    }
}

# ==========================================
# 5. SKRÓTY KLAWISZOWE (Zaktualizowane)
# ==========================================
# Myszy: Przesuwanie i Zmiana rozmiaru
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Terminal
bind = $mod, Return, exec, $terminal
bind = $mod, ENTER, exec, $terminal

# Programy i System
bind = $mod, W, exec, $browser
bind = $mod, N, exec, $fileManager
bind = $mod, D, exec, $menu

bind = $mod, Q, killactive,
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, M, exit,
bind = $mod, M, exec, flatpak run com.spotify.Client
bind = $mod, Y, exec, wezterm start --class yazi-float -e yazi
bind = $mod, H, exec, wezterm start -e htop

# ==========================================
# 6. SCREENSHOTY
# ==========================================
# Cały ekran
bind = $mod, Print, exec, grim ~/Pictures/screenshot-$(date +%s).png

# Region (WYŁĄCZNIE to jest najważniejszy fix)
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png

# Region do schowka
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# ==========================================
# 7. OKNA I FULLSCREEN
# ==========================================

# Win + F (Totalny fullscreen)
bind = $mod, F, fullscreen, 0

# Przełączanie trybu floating: Win + Shift + Space
bind = $mod SHIFT, Space, togglefloating, active

# Manewrowanie fokusem za pomocą strzałek:
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Zamiana miejscami okien (i3 style): Win + Shift + Strzałki
bind = $mod SHIFT, Left, swapwindow, l
bind = $mod SHIFT, Right, swapwindow, r
bind = $mod SHIFT, Up, swapwindow, u
bind = $mod SHIFT, Down, swapwindow, d

# Nawigacja focus (j, k, b, o)
bind = $mod, J, cyclenext,
bind = $mod, K, cyclenext, prev
bind = $mod, J, bringactivetotop,
bind = $mod, K, bringactivetotop,
bind = $mod, B, movefocus, u
bind = $mod, O, movefocus, r
bind = $mod, G, togglegroup
bind = $mod, Tab, changegroupactive

# Workspace'y (1-0)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ==========================================
# 8. NOWA STRATEGIA PRZEZROCZYSTOŚCI
# ==========================================
# A. OPERACJA GLOBALNE OKNO (0.79/0.71) - Dla Foot i Thunar
windowrulev2 = opacity 0.79 0.71, class:.*

# B. WYJĄTKI KOMUNIKACYJNE, NARZĘDZIA I PRZEGLĄDARKOWE (0.95/0.90)
windowrulev2 = opacity 0.90 0.80, class:^(firefox)$
windowrulev2 = opacity 0.90 0.80, class:^(Vivaldi-stable)$
windowrulev2 = opacity 0.90 0.80, class:^(vivaldi)$
windowrulev2 = opacity 0.90 0.80, class:^(Brave-browser)$
windowrulev2 = opacity 0.90 0.80, class:^(google-chrome)$
windowrulev2 = opacity 0.90 0.80, class:^(microsoft-edge)$
windowrulev2 = opacity 0.90 0.80, class:^(Code)$
windowrulev2 = opacity 0.90 0.80, class:^(VSCodium)$
windowrulev2 = opacity 0.90 0.80, class:^(com.vscodium.codium)$
windowrulev2 = opacity 0.90 0.80, class:^(md.obsidian.Obsidian)$

# C. MULTIMEDIA I LAUNCHERY (0.90/0.85)
windowrulev2 = opacity 0.90 0.85, class:^(steam)$
windowrulev2 = opacity 0.90 0.85, class:^(com.valvesoftware.Steam)$
windowrulev2 = opacity 0.90 0.85, class:^(com.heroicgameslauncher.hgl)$

# D. TRYB FULLSCREEN I GRY (BEZWZGLĘDNIE 1.0/1.0)
windowrulev2 = opacity 1.0 1.0, fullscreen:1

# --- AUDIO (Thinkpad F1-F4) ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
env = GDK_SCALE, 1
env = QT_SCALE_FACTOR, 1

