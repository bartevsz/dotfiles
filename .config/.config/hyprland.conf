# ==========================================
# 1. ZMIENNE GŁÓWNE
# ==========================================
$mod = SUPER
$terminal = foot
$browser = flatpak run com.vivaldi.Vivaldi
$fileManager = thunar
$menu = fuzzel

# ==========================================
# 2. MONITOR I AUTOSTART
# ==========================================
monitor=,preferred,auto,1

# Uruchomienie skryptu listującego pakiety przy starcie
exec-once = dbus-update-activation-environment --all
exec-once = yambar
exec-once = mako
exec-once = nm-applet
exec-once = hyprpaper
exec-once = blueman-applet
exec-once = swww-daemon
exec-once = swww img ~/Pictures/wallpapersden.com_sci-fi-cool-landscape-art-2k23_2912x1632.jpg --transition-type wipe


# auto group na workspace 3
exec-once = hyprctl --batch "keyword group:groupbar false"

env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_QPA_PLATFORM, wayland;xcb

# ==========================================
# 3. KLAWIATURA (POLSKIE ZNAKI)
# ==========================================
input {
	kb_layout = pl,sk
	kb_variant = ,
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1
}


# ==========================================
# 4. WYGLĄD
# ==========================================
general {
    gaps_in = 3
    gaps_out = 3
    border_size = 1
    col.active_border = rgba(00f0d8ee) # Neonowy Teal
    col.inactive_border = rgba(1e2d3baa) # Nieaktywny, ciemny moduł
}

decoration {
    rounding = 3
    shadow {
        enabled = true
        range = 7
        color = rgba(0b111a99) # Cień zlewający się z tłem
    }
}

# ==========================================
# 5. SKRÓTY KLAWISZOWE (Zaktualizowane)
# ==========================================
# Myszy: Przesuwanie i Zmiana rozmiaru
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Terminal
bind = $mod, Return, exec, $terminal
bind = $mod, ENTER, exec, $terminal

# Programy i System
bind = $mod, W, exec, $browser
bind = $mod, N, exec, $fileManager
bind = $mod, D, exec, $menu

bind = $mod, Q, killactive,
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, M, exit,
bind = $mod, M, exec, flatpak run com.spotify.Client
bind = $mod, Y, exec, wezterm start --class yazi-float -e yazi
bind = $mod, H, exec, wezterm start -e htop

# ==========================================
# 6. SCREENSHOTY
# ==========================================
# Cały ekran
bind = $mod, Print, exec, grim ~/Pictures/screenshot-$(date +%s).png

# Region (WYŁĄCZNIE to jest najważniejszy fix)
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png

# Region do schowka
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# ==========================================
# 7. OKNA I FULLSCREEN
# ==========================================

# Win + F (Totalny fullscreen)
bind = $mod, F, fullscreen, 0

# Przełączanie trybu floating: Win + Shift + Space
bind = $mod SHIFT, Space, togglefloating, active

# Manewrowanie fokusem za pomocą strzałek:
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Zamiana miejscami okien (i3 style): Win + Shift + Strzałki
bind = $mod SHIFT, Left, swapwindow, l
bind = $mod SHIFT, Right, swapwindow, r
bind = $mod SHIFT, Up, swapwindow, u
bind = $mod SHIFT, Down, swapwindow, d

# Nawigacja focus (j, k, b, o)
bind = $mod, J, cyclenext,
bind = $mod, K, cyclenext, prev
bind = $mod, J, bringactivetotop,
bind = $mod, K, bringactivetotop,
bind = $mod, B, movefocus, u
bind = $mod, O, movefocus, r
bind = $mod, G, togglegroup
bind = $mod, Tab, changegroupactive

# Workspace'y (1-0)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
# STEAM (proporcje)
# Główny interfejs Steam (4:3 przy 1080p)
windowrulev2 = tile, class:^(steam)$, title:^(Steam)$
windowrulev2 = minsize 1440 1080, class:^(steam)$, title:^(Steam)$

# Lista znajomych (Reszta: 480x1080)
#windowrulev2 = tile, class:^(steam)$, title:^(Lista znajomych)$
#windowrulev2 = minsize 480 1080, class:^(steam)$, title:^(Lista znajomych)$
#windowrulev2 = maxsize 480 1080, class:^(steam)$, title:^(Lista znajomych)$

# Wymusza dokładny rozmiar 4:3 (1440x1080) dla głównego okna
bind = $mod, P, exec, hyprctl --batch "dispatch focuswindow title:^(Steam)$ ; dispatch resizeactive exact 1440 1080"
# Główny interfejs Steam (Proporcje 4:3)
#windowrulev2 = float, class:^(steam)$, title:^(Steam)$
#windowrulev2 = size 1440 1080, class:^(steam)$, title:^(Steam)$
#windowrulev2 = move 0 0, class:^(steam)$, title:^(Steam)$

# Okno znajomych (Reszta ekranu: 480x1080)
#windowrulev2 = float, class:^(steam)$, title:^(Lista znajomych)$
#windowrulev2 = size 480 1080, class:^(steam)$, title:^(Lista znajomych)$
#windowrulev2 = move 1440 0, class:^(steam)$, title:^(Lista znajomych)$

# TELEGRAM (różne możliwe klasy)
windowrulev2 = workspace 3, class:^(org.telegram.desktop)$
windowrulev2 = workspace 3, class:^(TelegramDesktop)$

# DISCORD
windowrulev2 = workspace 3, class:^(com.discordapp.Discord)$
windowrulev2 = workspace 3, class:^(vesktop)$

# 333 Zmuszenie Spotify do działania wyłącznie na Workspace 3:
windowrulev2 = workspace 3, class:^(spotify)$
windowrulev2 = workspace 3, class:^(com.spotify.Client)$

# każde nowe okno na workspace 3 trafia do aktywnej grupy
# windowrulev2 = group, workspace:3

# PRACA, INTERNET I NARZĘDZIA (0.95) -
# Przeglądarki
windowrulev2 = opacity 0.95 0.90, class:^(firefox)$
windowrulev2 = opacity 0.95 0.90, class:^(Vivaldi-stable)$
windowrulev2 = opacity 0.95 0.90, class:^(vivaldi)$
windowrulev2 = opacity 0.95 0.90, class:^(Brave-browser)$
windowrulev2 = opacity 0.95 0.90, class:^(google-chrome)$
windowrulev2 = opacity 0.95 0.90, class:^(microsoft-edge)$

# Narzędzia deweloperskie i biuro
windowrulev2 = opacity 0.95 0.90, class:^(Code)$
windowrulev2 = opacity 0.95 0.90, class:^(VSCodium)$
windowrulev2 = opacity 0.95 0.90, class:^(com.vscodium.codium)$
windowrulev2 = opacity 0.95 0.90, class:^(codium)$
windowrulev2 = opacity 0.95 0.90, class:^(obsidian)$
windowrulev2 = opacity 0.95 0.90, class:^(Logseq)$
windowrulev2 = opacity 0.95 0.90, class:^(notion-app)$
windowrulev2 = opacity 0.95 0.85, class:^(obsidian)$

# Komunikacja
windowrulev2 = opacity 0.95 0.90, class:^(com.discordapp.Discord)$
windowrulev2 = opacity 0.95 0.90, class:^(vesktop)$
windowrulev2 = opacity 0.95 0.90, class:^(WebCord)$
windowrulev2 = opacity 0.95 0.90, class:^(Slack)$
windowrulev2 = opacity 0.95 0.90, class:^(teams-for-linux)$


# 3. MULTIMEDIA I PLIKI (0.90) 
windowrulev2 = opacity 0.90 0.85, class:^(spotify)$
windowrulev2 = opacity 0.90 0.85, class:^(org.gnome.Nautilus)$
windowrulev2 = opacity 0.90 0.85, class:^(nautilus)$
windowrulev2 = opacity 0.90 0.85, class:^(PureRef)$
windowrulev2 = opacity 0.90 0.85, class:^(vlc)$
windowrulev2 = opacity 0.90 0.85, class:^(okular)$
windowrulev2 = opacity 0.90 0.85, class:^(flatpak run com.todoist.Todoist)$

# Steam i Heroic - Launchery gier
windowrulev2 = opacity 0.90 0.85, class:^(steam)$
windowrulev2 = opacity 0.90 0.85, class:^(com.valvesoftware.Steam)$
windowrulev2 = opacity 0.90 0.85, class:^(heroic)$
windowrulev2 = opacity 0.90 0.85, class:^(com.heroicgameslauncher.hgl)$

# WAŻNE: Gry odpalane przez Heroic też będą chronione tą regułą:
windowrulev2 = opacity 1.0 1.0, fullscreen:1

# Pływające okno dla Yazi
windowrulev2 = float, class:^(yazi-float)$
windowrulev2 = size 1000 600, class:^(yazi-float)$
windowrulev2 = center, class:^(yazi-float)$

# --- AUDIO (Thinkpad F1-F4) ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
env = GDK_SCALE, 1
env = QT_SCALE_FACTOR, 1
